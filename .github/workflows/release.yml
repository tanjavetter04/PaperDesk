name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb"
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: macos-latest
            args: "--bundles dmg"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Check frontend
        run: npm run check

      # Uploads platform installers as release assets (NSIS, AppImage, .deb, DMG).
      # GitHub still shows automatic “Source code” zip/tar links on every release; those cannot be disabled.
      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          includeUpdaterJson: false
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: PaperDesk ${{ env.RELEASE_TAG }}
          releaseBody: |
            **Installers (use these):** Windows (NSIS `.exe`), Linux (AppImage + `.deb`), macOS (DMG).

            GitHub always adds **Source code (zip/tar.gz)** for the tag; that is not the app — download the files above under **Assets**.
          generateReleaseNotes: true
          prerelease: false
